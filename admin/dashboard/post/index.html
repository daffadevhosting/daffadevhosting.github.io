---
layout: default
title: Edit Post
permalink: /dashboard/post
---

    <ion-list id="post-edit-list"></ion-list>

<ion-toast id="toast" duration="2000"></ion-toast>

<script type="module">
// Inisialisasi Firebase
const firebaseConfig = {
    apiKey: "{{site.apiKey}}",
    authDomain: "{{site.authDomain}}",
    databaseURL: "{{site.databaseURL}}",
    projectId: "{{site.projectId}}",
    storageBucket: "{{site.storageBucket}}",
    messagingSenderId: "{{site.senderId}}",
    appId: "{{site.appId}}"
};

firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function fetchPosts() {
        const postList = document.getElementById("post-edit-list");
        postList.innerHTML = "";

        const snapshot = await db.collection("posts").orderBy("timestamp", "desc").get();
        snapshot.forEach(doc => {
            const post = doc.data();
            const postId = doc.id;

            const postItem = document.createElement("ion-item");
            postItem.innerHTML = `
                <ion-label>
                    <h2>${post.title}</h2>
                    <p>${post.content}</p>
                </ion-label>
                <ion-button color="warning" onclick="editPost('${postId}')">Edit</ion-button>
                <ion-button color="danger" onclick="deletePost('${postId}')">Hapus</ion-button>
            `;
            postList.appendChild(postItem);
        });
    }

    async function deletePost(postId) {
        if (!confirm("Apakah Anda yakin ingin menghapus postingan ini?")) return;

        try {
            await db.collection("posts").doc(postId).delete();
            showToast("Post berhasil dihapus", "success");
            fetchPosts();
        } catch (error) {
            console.error("Error:", error);
            showToast("Gagal menghapus post", "danger");
        }
    }

    function editPost(postId) {
        window.location.href = `/dashboard/post/edit.html?id=${postId}`;
    }

    function showToast(message, color) {
        const toast = document.getElementById("toast");
        toast.message = message;
        toast.color = color;
        toast.present();
    }

    fetchPosts();
</script>
