---
layout: default
title: Posting
permalink: /dashboard/tambah
---

<ion-toast id="toast" duration="2000"></ion-toast>
<ion-card>
<form id="post-form">
  <ion-list [inset]="true">
    <ion-item lines="full">
      <ion-input id="title" label="Judul"></ion-input>
    </ion-item>
    <ion-item lines="full">
      <ion-input id="image" label="Gambar"></ion-input>
    </ion-item>
  </ion-list>

  <ion-list [inset]="true">
    <ion-item lines="full">
      <ion-textarea id="content" label="Konten Blog" labelPlacement="floating" rows="5"></ion-textarea>
    </ion-item>
  </ion-list>
<p />
    <ion-button expand="full" type="submit">Tambah Post</ion-button>
</form>

<!--<ion-button id="logoutBtn" expand="full" color="danger">Logout</ion-button>-->

</ion-card>
