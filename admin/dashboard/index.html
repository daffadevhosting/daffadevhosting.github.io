layout: default
title: Posting
permalink: /dashboard
---

<ion-toast id="toast" duration="2000"></ion-toast>
<ion-card>
<form id="post-form">
    <ion-item>
        <ion-label position="floating">Judul</ion-label>
        <ion-input id="title" type="text"></ion-input>
    </ion-item>
    <ion-item>
        <ion-label position="floating">Konten</ion-label>
        <ion-input id="content" type="text"></ion-input>
    </ion-item>
    <ion-item>
        <ion-label position="floating">Gambar (Opsional)</ion-label>
        <ion-input id="image" type="text"></ion-input>
    </ion-item>
    <ion-button expand="full" type="submit">Tambah Post</ion-button>
</form>

<ion-button id="logoutBtn" expand="full" color="danger">Logout</ion-button>
</ion-card>
{% include modulePostAdmin.html %}

    <ion-list id="post-edit-list"></ion-list>

<ion-modal id="edit-modal">
    <ion-header>
        <ion-toolbar>
            <ion-title>Edit Postingan</ion-title>
            <ion-buttons slot="end">
                <ion-button onclick="closeEditModal()">Tutup</ion-button>
            </ion-buttons>
        </ion-toolbar>
    </ion-header>
    <ion-content>
        <form id="edit-form">
            <ion-item>
                <ion-label position="floating">Judul</ion-label>
                <ion-input id="edit-title" type="text"></ion-input>
            </ion-item>
            <ion-item>
                <ion-label position="floating">Konten</ion-label>
                <ion-input id="edit-content" type="text"></ion-input>
            </ion-item>
            <ion-button expand="full" type="submit">Simpan Perubahan</ion-button>
        </form>
    </ion-content>
</ion-modal>

<ion-toast id="toast" duration="2000"></ion-toast>

<script>
const db = firebase.firestore();
let currentPostId = null;

// Ambil modal sekali di awal
const editModal = document.getElementById("edit-modal");

async function fetchPosts() {
    const postList = document.getElementById("post-edit-list");
    postList.innerHTML = "";

    const snapshot = await db.collection("posts").orderBy("timestamp", "desc").get();
    snapshot.forEach(doc => {
        const post = doc.data();
        const postId = doc.id;

        const postItem = document.createElement("ion-item");
        postItem.innerHTML = `
            <ion-label>
                <h2>${post.title}</h2>
                <p>${post.content}</p>
            </ion-label>
            <ion-button color="warning" onclick="openEditModal('${postId}')">Edit</ion-button>
            <ion-button color="danger" onclick="deletePost('${postId}')">Hapus</ion-button>
        `;
        postList.appendChild(postItem);
    });
}

async function openEditModal(postId) {
    currentPostId = postId;

    // Ambil data post dari Firestore
    const doc = await db.collection("posts").doc(postId).get();
    if (doc.exists) {
        document.getElementById("edit-title").value = doc.data().title;
        document.getElementById("edit-content").value = doc.data().content;
    }

    // Tampilkan modal
    editModal.setAttribute("is-open", "true");
}

function closeEditModal() {
    editModal.removeAttribute("is-open");
}

// Tambahkan event listener untuk submit edit form
document.getElementById("edit-form").addEventListener("submit", async function(event) {
    event.preventDefault();

    const titleInput = document.getElementById("edit-title").value.trim();
    const contentInput = document.getElementById("edit-content").value.trim();

    if (!titleInput || !contentInput) {
        showToast("Judul dan Konten tidak boleh kosong!", "danger");
        return;
    }

    try {
        await db.collection("posts").doc(currentPostId).update({
            title: titleInput,
            content: contentInput,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        showToast("Post berhasil diperbarui", "success");
        fetchPosts();
        closeEditModal();
    } catch (error) {
        console.error("Error:", error);
        showToast("Gagal memperbarui post", "danger");
    }
});

async function deletePost(postId) {
    const alert = document.createElement("ion-alert");
    alert.header = "Konfirmasi";
    alert.message = "Apakah Anda yakin ingin menghapus postingan ini?";
    alert.buttons = [
        {
            text: "Batal",
            role: "cancel"
        },
        {
            text: "Hapus",
            handler: async () => {
                try {
                    await db.collection("posts").doc(postId).delete();
                    showToast("Post berhasil dihapus", "success");
                    fetchPosts();
                } catch (error) {
                    console.error("Error:", error);
                    showToast("Gagal menghapus post", "danger");
                }
            }
        }
    ];

    document.body.appendChild(alert);
    await alert.present();
}

function showToast(message, color) {
    const toast = document.getElementById("toast");
    toast.message = message;
    toast.color = color;
    toast.present();
}

fetchPosts();
</script>
