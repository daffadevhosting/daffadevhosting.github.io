---
layout: default
title: Login
permalink: /login
---

<div class="content center_parent">
<ion-card class="flex_login">
<div class="img_login">
<img class="ion-padding" src="{{site.baseurl}}{{site.logo}}">
</div>
	<ion-card-content>
		<form id="loginForm">
			<ion-list>
				<ion-item lines="full">
				  <ion-input type="email" id="email" label-placement="floating" clear-input="true" fill="outline" value="">
					<div slot="label">Email <ion-text color="danger">(Required)</ion-text></div>
				  </ion-input>
				</ion-item>
				<ion-item lines="full">
				  <ion-input type="password" id="password" label-placement="floating" clear-input="true" fill="outline" value="">
					<div slot="label">Password <ion-text color="danger">(Required)</ion-text></div>
				  </ion-input>
				</ion-item>
			  </ion-list>
		  <ion-button expand="block" fill="outline" type="submit" id="loginButton">Sign in</ion-button>
		</form>
	</ion-card-content>
</ion-card>
</div>
  <script src="https://www.google.com/recaptcha/api.js?render={{site.SITE_KEY}}"></script>
