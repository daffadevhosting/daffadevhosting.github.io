<ion-card>
{% include iframe.html %}
	<ion-card-content>
		<form id="loginForm">
			<ion-list>
				<ion-item lines="full">
				  <ion-input type="email" id="email" labelPlacement="floating" value="">
					<div slot="label">Email <ion-text color="danger">(Required)</ion-text></div>
				  </ion-input>
				</ion-item>
				<ion-item lines="full">
				  <ion-input type="password" id="password" labelPlacement="floating" value="">
					<div slot="label">Password <ion-text color="danger">(Required)</ion-text></div>
				  </ion-input>
				</ion-item>
			  </ion-list>
		  <ion-button expand="block" fill="outline" type="submit" id="loginButton">Sign in</ion-button>
		</form>
	</ion-card-content>
</ion-card>
