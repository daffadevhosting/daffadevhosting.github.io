---
layout: default
---

<style>
.post-card-wide > .mdl-card__title {
  color: #fff;
  height: 176px;
}
.post-card-wide > .mdl-card__menu {
  color: #fff;
}
.tmbl {
  float: right;
    }
</style>
<div class="mdl-grid">
  {% for post in site.posts %}
    <article class="post">

<div class="post-card-wide mdl-card mdl-shadow--2dp mdl-cell mdl-cell--6-col mdl-cell--8-col-tablet">
  <div class="mdl-card__title" style="background: url('{{ post.image }}') center / cover; background-blend-mode: overlay; background-color: rgb(0 0 0 / 54%);">
    <h2 class="mdl-card__title-text">{{ post.title }}</h2>
  </div>
  <div class="mdl-card__supporting-text">
        {{ post.excerpt }}
  </div>
  <div class="mdl-card__actions mdl-card--border">
    <a href="{{ site.baseurl }}{{ post.url }}" class="mdl-button mdl-button--colored mdl-js-button mdl-js-ripple-effect tmbl">
      Read More
    </a>
  </div>
</div>
    </article>
  {% endfor %}
</div>
