<ion-card>
<ion-card-content>
<h2>Tambah Produk</h2>
<form id="productForm">
    <input type="text" id="title" placeholder="Nama Produk" required><br>
    <input type="text" id="harga" placeholder="Harga" required><br>
    <input type="text" id="stok" placeholder="Stok (Tersedia/Habis)" required><br>
    <input type="text" id="categories" placeholder="Kategori" required><br>
    <input type="text" id="tags" placeholder="Tag" required><br>
    <input type="text" id="rating" placeholder="Rating (1-5)" required><br>
    <textarea id="images" placeholder="Masukkan URL gambar, pisahkan dengan koma" required></textarea><br>
    <textarea id="deskripsi" placeholder="Deskripsi Produk" required></textarea><br>
    <button type="submit">Tambah Produk</button>
</form>
</ion-card-content>
</ion-card>
<h2>Daftar Produk</h2>
<div id="productList"></div>

<script type="module" src="{{site.baseurl}}/product/add/products.js"></script>

<style>
.carousel {
    position: relative;
    max-width: 300px;
    margin: auto;
}

.slide {
    display: none;
}

button.prev, button.next {
    position: absolute;
    top: 50%;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    transform: translateY(-50%);
}

button.prev {
    left: 0;
}

button.next {
    right: 0;
}
</style>
