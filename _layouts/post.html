---
layout: default
title: {{ page.title }}
description: {{ page.description | default: site.description }}
---

  <main style="padding: 24px; max-width: 760px; margin: 0 auto; font-family: Arial, sans-serif;">
    <h1>{{ page.title }}</h1>
    <p><em>{{ page.date | date: "%d %B %Y" }}</em> · {{ page.read_time }}</p>
    <div>{{ content }}</div>
  </main>
