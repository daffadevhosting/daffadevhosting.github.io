<!-- Spinner untuk loading -->
<div id="loading-spinner">
    <ion-spinner name="crescent"></ion-spinner>
</div>

<script type="module">
    // Inisialisasi Firebase
    const firebaseConfig = {
        apiKey: "{{site.apiKey}}",
        authDomain: "{{site.authDomain}}",
        databaseURL: "{{site.databaseURL}}",
        projectId: "{{site.projectId}}",
        storageBucket: "{{site.storageBucket}}",
        messagingSenderId: "{{site.senderId}}",
        appId: "{{site.appId}}"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Ambil ID artikel dari URL
    function getPostId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id"); // Mengambil nilai parameter "id" dari URL
    }

    // Fungsi untuk mengambil dan menampilkan artikel
    async function fetchPost() {
        const postId = getPostId();
        const postContainer = document.getElementById("post-container");
        const loadingSpinner = document.getElementById("loading-spinner");

        // Tampilkan spinner
        loadingSpinner.style.display = "flex";

        if (!postId) {
            postContainer.innerHTML = `<ion-text class="flex_center" color="danger">Artikel tidak ditemukan.</ion-text>`;
            loadingSpinner.style.display = "none"; // Sembunyikan spinner
            return;
        }

        try {
            const doc = await db.collection("posts").doc(postId).get();

            if (!doc.exists) {
                postContainer.innerHTML = `<ion-text class="flex_center">Artikel tidak ditemukan.</ion-text>`;
                return;
            }

            const post = doc.data();

            postContainer.innerHTML = `
                <ion-text><h1 class="mb-3">${post.title}</h1></ion-text>
                <ion-note class="text-muted"><sub>Dipublikasikan pada</sub> ${post.timestamp ? post.timestamp.toDate().toLocaleDateString() : "Tanggal tidak tersedia"}</ion-note>
                <p class="">
                    <img src="${post.image || 'https://via.placeholder.com/800x400'}" class="img-thumb" alt="${post.title}" style="max-width: 640px;width: 100%;height: 380px;">
                    <div class='card p-3 mb-2'>
                        <ion-text class="text-start">${post.content}</ion-text>
                    </div>
                </p>
            `;
        } catch (error) {
            postContainer.innerHTML = `<p class="text-danger">Gagal memuat artikel.</p>`;
            console.error("Error fetching post:", error);
        } finally {
            // Sembunyikan spinner setelah data selesai dimuat
            loadingSpinner.style.display = "none";
        }
    }

    fetchPost();
</script>

<style type="text/css">
    .img-thumb {
        object-fit: cover;
        background-size: cover;
        background-position: center center;
    }
    .flex_center {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        height: 100%;
    }
    #loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        display: none; /* Default tersembunyi */
        align-items: center;
        justify-content: center;
    }
</style>
