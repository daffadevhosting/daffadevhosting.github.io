<script type="module">
    // Konfigurasi Firebase
    const firebaseConfig = {
                    apiKey: "{{site.apiKey}}",
                    authDomain: "{{site.authDomain}}",
                    databaseURL: "{{site.databaseURL}}",
                    projectId: "{{site.projectId}}",
                    storageBucket: "{{site.storageBucket}}",
                    messagingSenderId: "{{site.SenderId}}",
                    appId: "{{site.appId}}"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Fetch data dari Firestore
    async function fetchPosts() {
        const postsContainer = document.getElementById("posts");
        postsContainer.innerHTML = '<div class="flex_center"><ion-spinner name="bubbles"></ion-spinner><span class="ion-text-center"><h3>Loading...</h3></span></div>';

        try {
            const querySnapshot = await db.collection("posts").orderBy("timestamp", "desc").limit(3).get();
            let html = "";
            querySnapshot.forEach(doc => {
                const post = doc.data();
                html += `
                    
                        <ion-card>
                            <img src="${post.image || 'https://via.placeholder.com/600'}" class="card-img-top" alt="${post.title}" loading="lazy">
                            <ion-card-header>
                                <ion-card-title>${post.title}</ion-card-title>
                            </ion-card-header>
                                <ion-card-content>${post.content.substring(0, 80)}...</ion-footer slot="bottom">
                                    <ion-toolbar>
                                <a href="/blog/post.html?id=${doc.id}" class="btn btn-sm btn-primary float-end">Baca Selengkapnya</a>
                                </ion-toolbar>
                                </ion-footer>
                            </ion-card-content>
                        </ion-card>
                    `;
            });

            postsContainer.innerHTML = html;
        } catch (error) {
            postsContainer.innerHTML = `<p class="text-danger text-center">Gagal memuat postingan.</p>`;
            console.error("Error fetching posts:", error);
        }
    }

    fetchPosts();
</script>
