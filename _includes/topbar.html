<!-- SIDEBAR PROFIL PENGEMBANG -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<aside class="sidebar-panel" id="sidebarPanel" inert>
  <ion-buttons style="justify-content: flex-end;">

    </ion-button>
  </ion-buttons>
  <div class="sidebar-header">

    <div>
      <h3 id="sidebarUsername">Tamu</h3>
      <!-- MENAMPILKAN FOLLOWERS TEPAT DI BAWAH USERNAME -->

<!-- SIDEBAR BARU: PANEL FILE EXPLORER CLOUDFLARE R2 (Sisi Kanan) -->
<div class="r2-sidebar-backdrop" id="r2Backdrop"></div>
<aside class="r2-sidebar-panel" id="r2Panel" inert>
  <button type="button" class="sidebar-close" id="r2CloseBtn" aria-label="Tutup File Cloud">
    <ion-icon name="close-outline"></ion-icon>
  </button>
  
  <div class="sidebar-header" style="border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 20px;">
    <div class="r2-header-icon" style="width: 44px; height: 44px; border-radius: 12px; background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); display: flex; justify-content: center; align-items: center; color: #58a6ff; font-size: 20px; margin-right: 12px;">
      <ion-icon name="cloud-done-outline"></ion-icon>
    </div>
    <div>
      <h3 style="font-size: 16px; margin: 0; font-weight: 600; color: #ffffff;">Cloud File Storage</h3>
      <p style="font-size: 11px; color: #8b949e; margin: 2px 0 0;">Cloudflare Bucket Manager</p>
    </div>
  </div>

  <!-- Drag and Drop Area untuk Unggah File ke R2 -->
  <div class="r2-upload-zone" id="r2UploadZone" style="border: 2px dashed rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 24px 16px; text-align: center; margin: 16px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.01);">
    <input type="file" id="r2FileInput" style="display: none;" />
    <ion-icon name="arrow-up-circle-outline" style="font-size: 32px; color: #58a6ff; margin-bottom: 8px;"></ion-icon>
    <p style="font-size: 12px; font-weight: 500; margin: 0; color: #e6edf3;">Unggah File ke Cloud</p>
    <p style="font-size: 10px; color: #8b949e; margin: 4px 0 0;">Klik atau seret file ke area ini</p>
  </div>

  <!-- Kontainer List File R2 -->
  <div class="r2-file-section" style="flex: 1; overflow-y: auto; padding: 0 16px 20px;">
    <h4 style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin: 0 0 12px 4px; font-weight: 600;">File Saya</h4>
    <div id="r2FileList" style="display: flex; flex-direction: column; gap: 8px;">
      <!-- File list item di-render secara dinamis lewat js -->
      <div style="text-align: center; color: #8b949e; font-size: 12px; padding: 30px 0;">Belum ada file terunggah.</div>
    </div>
  </div>
</aside>
