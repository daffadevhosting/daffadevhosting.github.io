<h1 id="otomatisasi-github-pages--actions">Otomatisasi GitHub Pages &amp; Actions</h1>

<p>Dengan GitHub Actions, Anda bisa mendeploy website Jekyll tanpa harus build lokal setiap kali ada perubahan.</p>

<h2 id="keuntungan">Keuntungan</h2>

<ul>
  <li>Deploy otomatis saat push ke branch utama.</li>
  <li>Tidak perlu menjalankan build manual.</li>
  <li>Lebih konsisten untuk tim.</li>
</ul>
